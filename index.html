<title>スクスク 회화입문 - 일본어 학습</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f0f0f;
  color: #e6e6e6;
  font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
  min-height: 100vh;
}
.layout { display: flex; min-height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  width: 256px; min-width: 256px;
  background: #111111;
  border-right: 1px solid #2a2a2a;
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.sidebar-header {
  padding: 24px 20px 18px;
  border-bottom: 1px solid #2a2a2a;
}
.sidebar-logo {
  font-size: 16px; font-weight: 700;
  color: #FFFA00;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.sidebar-sub { font-size: 11px; color: #555; margin-top: 5px; letter-spacing: 0.5px; }
.sidebar-section {
  padding: 14px 20px 6px;
  font-size: 10px; color: #444;
  text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px;
  text-decoration: none; color: #888;
  font-size: 12px;
  border-left: 2px solid transparent;
  transition: all 0.15s;
}
.nav-item:hover { background: #1a1a1a; color: #FFFA00; border-left-color: #FFFA00; }
.nav-item.active { background: #1c1c00; color: #FFFA00; border-left-color: #FFFA00; font-weight: 600; }
.nav-num { font-size: 10px; color: #444; min-width: 22px; text-align: right; font-family: monospace; }
.nav-item.active .nav-num { color: #888; }
.nav-item:hover .nav-num { color: #888; }

/* ── Main ── */
.main { flex: 1; padding: 44px 52px; max-width: 960px; }

.hero { margin-bottom: 44px; }
.hero-label {
  font-size: 10px; letter-spacing: 3px; color: #FFFA00;
  text-transform: uppercase; margin-bottom: 12px; font-weight: 700;
}
.hero h1 {
  font-size: 34px; font-weight: 700;
  color: #f0f0f0;
  letter-spacing: -0.5px;
  margin-bottom: 10px;
}
.hero h1 span { color: #FFFA00; }
.hero p { font-size: 14px; color: #666; line-height: 1.7; }
.hero p strong { color: #FFFA00; font-weight: 600; }

.stats { display: flex; gap: 14px; margin-top: 28px; }
.stat {
  background: #161616;
  border: 1px solid #2a2a2a;
  border-top: 2px solid #FFFA00;
  border-radius: 4px;
  padding: 16px 22px; text-align: center;
  min-width: 90px;
}
.stat-num { font-size: 26px; font-weight: 700; color: #FFFA00; font-family: monospace; }
.stat-label { font-size: 10px; color: #555; margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

/* ── Cards ── */
.section-label {
  font-size: 10px; color: #FFFA00; text-transform: uppercase;
  letter-spacing: 2px; margin-bottom: 18px; font-weight: 700;
  display: flex; align-items: center; gap: 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: #222; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.card {
  background: #141414;
  border: 1px solid #262626;
  border-radius: 4px;
  padding: 18px;
  text-decoration: none; color: inherit;
  transition: all 0.18s;
  display: block;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 0; height: 2px;
  background: #FFFA00;
  transition: width 0.25s;
}
.card:hover::before { width: 100%; }
.card:hover { border-color: #3a3a00; background: #181800; transform: translateY(-1px); }
.card-num {
  font-size: 10px; color: #444; font-weight: 700;
  letter-spacing: 1px; margin-bottom: 8px;
  font-family: monospace;
}
.card:hover .card-num { color: #888; }
.card-title { font-size: 14px; color: #e0e0e0; font-weight: 600; margin-bottom: 5px; }
.card:hover .card-title { color: #FFFA00; }
.card-sub { font-size: 11px; color: #555; }
.card-icon { font-size: 20px; margin-bottom: 10px; opacity: 0.7; }
</style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar">

  </nav>

  <!-- Main -->
  <main class="main">
    <div class="hero">
      <div class="hero-label">넥슨게임즈 · 일본어 전화 수업</div>
      <h1>일본어 <span>학습노트</span></h1>
      <p>수업별 학습 자료입니다.<br>
      세션을 선택하면 <strong>일본어 원문 · 로마지 · 한국어</strong>를 한눈에 확인할 수 있습니다.</p>
      <div class="stats">
        <div class="stat"><div class="stat-num">1</div><div class="stat-label">Sessions</div></div>
        <div class="stat"><div class="stat-num">JP·RO·KR</div><div class="stat-label">Languages</div></div>
      </div>
    </div>

    <div class="section-label">넥슨게임즈 수업 세션</div>
    <div class="grid">
      <a class="card" href="Session_20260507.html" style="border-top-color:#4e9af1;">
        <div class="card-icon">📘</div>
        <div class="card-num" style="color:#4e9af1;">2026-05-07</div>
        <div class="card-title">형용사의 부사형 익히기</div>
        <div class="card-sub">～ないでください · く/に 부사형</div>
      </a>
    </div>
  </main>
</div>
</body>
</html>
